# CI — orders-api (build + test solution; trigger przy zmianach w orders-api)
name: CI - orders-api

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['src/orders-api/**']
  pull_request:
    branches: [master]
    paths: ['src/orders-api/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore OrderFlow.sln

      - name: Build
        run: dotnet build OrderFlow.sln --no-restore -c Release

      - name: Test
        run: dotnet test src/orders-api/Orders.Api.Tests/Orders.Api.Tests.csproj --no-build -c Release --verbosity normal
