name: Terraform Plan (dev)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/terraform/**'

permissions:
  id-token: write    # wymagane dla OIDC
  contents: read     # wymagane dla checkout

jobs:
  terraform-plan-dev:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-central-1
      TF_WORKING_DIR: infra/terraform/envs/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write backend config for CI
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if [ -z "${{ vars.TF_BACKEND_BUCKET }}" ]; then
            echo "::error::Zmienna repozytorium TF_BACKEND_BUCKET nie jest ustawiona. Ustaw ją w Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          cat << EOF > backend.ci.hcl
          bucket = "${{ vars.TF_BACKEND_BUCKET }}"
          key    = "dev/terraform.tfstate"
          region = "${{ env.AWS_REGION }}"
          EOF

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::292187657518:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false -backend-config=backend.ci.hcl

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -no-color

